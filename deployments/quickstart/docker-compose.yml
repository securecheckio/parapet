version: '3.8'

services:
  parapet-proxy:
    image: ghcr.io/securecheckio/parapet-proxy:latest
    ports:
      - "8899:8899"
    environment:
      # Your Solana RPC endpoint
      - UPSTREAM_RPC_URL=https://api.mainnet-beta.solana.com
      
      # Optional: Add your API keys for enhanced protection
      # - HELIUS_API_KEY=your_helius_key_here
      # - JUPITER_API_KEY=your_jupiter_key_here
      
      # Rule feeds configuration
      - RULES_FEED_ENABLED=true
      - RULES_FEED_URLS=https://parapet-rules.securecheck.io/community/core-protection.json,https://parapet-rules.securecheck.io/community/helius-protection.json,https://parapet-rules.securecheck.io/community/jupiter-protection.json
      
      # Logging
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
