# fly.toml app configuration file generated for parapet-rpc-proxy on 2026-04-23T18:08:28-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'parapet-rpc-proxy'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  ACTIVITY_FEED_ENABLED = 'true'
  ACTIVITY_FEED_MIN_RISK = '30'
  DEFAULT_BLOCK_THRESHOLD = '70'
  HELIUS_RATE_LIMIT = '20/60'
  JUPITER_RATE_LIMIT = '60/60'
  OTTERSEC_RATE_LIMIT = '30/60'
  PROXY_PORT = '8899'
  RUGCHECK_RATE_LIMIT = '10/60'
  RULES_FEED_ENABLED = 'true'
  RULES_FEED_POLL_INTERVAL = '3600'
  RULES_FEED_URLS = 'https://parapet-rules.securecheck.io/community/core-protection.json'
  RUST_LOG = 'info,parapet_rpc_proxy=debug'
  SOLANA_NETWORK = 'mainnet-beta'
  UPSTREAM_RPC_URL = 'https://api.mainnet-beta.solana.com'

[http_service]
  internal_port = 8899
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8899
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 800

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'
    protocol = 'http'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[metrics]]
  port = 9091
  path = '/metrics'
