# Parapet Security Audit Configuration
# This file configures cargo-audit to handle known issues from third-party dependencies

[advisories]
# Vulnerabilities we're tracking but can't immediately fix without major upgrades.
# Canonical config for `cargo audit` (run from the `parapet/` workspace root).
# Previously duplicated in `.cargo/audit.toml` — keep a single file here.

# RUSTSEC-2026-0104: rustls-webpki CRL parsing panic
# RUSTSEC-2026-0098 / RUSTSEC-2026-0099: rustls-webpki (older tree via Solana / transitive)
# RUSTSEC-2022-0093 / RUSTSEC-2024-0344: dalek family (Solana pins)
ignore = [
    "RUSTSEC-2026-0104",  # rustls-webpki CRL
    "RUSTSEC-2026-0097",  # rand / custom logger (transitive Solana)
    "RUSTSEC-2026-0098",  # rustls-webpki constraints (transitive)
    "RUSTSEC-2026-0099",  # rustls-webpki wildcards (transitive)
    "RUSTSEC-2022-0093",  # ed25519-dalek (Solana)
    "RUSTSEC-2024-0344",  # curve25519-dalek (Solana)
]

# RUSTSEC-2026-0097: rand unsoundness with custom logger
# Status: Transitive dependency from Solana SDK 4.x
# Impact: Low - requires custom logger implementation, which we don't use
# Mitigation: Track upstream Solana / rand releases

[advisories.unmaintained]
# Unmaintained crates that are transitive dependencies from Solana SDK 4.x
# Mitigation: track Solana dependency upgrades

ignore = [
    "RUSTSEC-2024-0375",  # atty - unmaintained, from solana-logger
    "RUSTSEC-2025-0141",  # bincode 1.3.3 - unmaintained, from Solana SDK
    "RUSTSEC-2024-0388",  # derivative - unmaintained, from ark-* (Solana crypto)
    "RUSTSEC-2025-0161",  # libsecp256k1 - unmaintained, from Solana secp256k1
    "RUSTSEC-2025-0119",  # number_prefix - unmaintained, from indicatif (Solana progress bars)
    "RUSTSEC-2024-0436",  # paste - unmaintained, from ark-ff (Solana crypto)
]

[advisories.unsound]
# Unsound crates from transitive dependencies

# RUSTSEC-2021-0145: atty potential unaligned read
# Status: Transitive from solana-logger via env_logger
# Impact: Low - atty is only used for terminal detection
ignore = [
    "RUSTSEC-2021-0145",  # atty unaligned read
    "RUSTSEC-2026-0097",  # rand unsoundness (covered above but listed here for clarity)
]

# Database security recommendations
[database]
# Note: We use Postgres 15+ for parapet-platform (meets requirements)
# Note: We use Redis 7+ for production caching (meets requirements)
