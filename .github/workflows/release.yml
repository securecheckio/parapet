name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev build-essential

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2

    - name: Build release binary
      run: cargo build --release -p parapet-proxy

    - name: Strip binary
      run: strip target/release/parapet-proxy

    - name: Create tarball
      run: |
        cd target/release
        tar -czf parapet-proxy-linux-x86_64.tar.gz parapet-proxy
        sha256sum parapet-proxy-linux-x86_64.tar.gz > parapet-proxy-linux-x86_64.tar.gz.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: parapet-proxy-linux-x86_64
        path: |
          target/release/parapet-proxy-linux-x86_64.tar.gz
          target/release/parapet-proxy-linux-x86_64.tar.gz.sha256

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/parapet-proxy
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  release:
    name: Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: parapet-proxy-linux-x86_64

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          parapet-proxy-linux-x86_64.tar.gz
          parapet-proxy-linux-x86_64.tar.gz.sha256
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Deployment Options
          
          ### Docker (Recommended for Open Source)
          ```bash
          docker pull ghcr.io/securecheckio/parapet-proxy:${{ github.ref_name }}
          ```
          
          ### Native Binary (Maximum Performance)
          Download the tarball below and extract to your server.
          
          See [Terraform deployment guide](https://github.com/${{ github.repository }}/tree/main/terraform) for automated setup.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
