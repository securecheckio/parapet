version: "3.8"

services:
  proxy:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: parapet:latest
    container_name: parapet-rpc-proxy
    command: ["parapet-rpc-proxy"]
    ports:
      - "8899:8899"
    environment:
      - UPSTREAM_RPC_URL=${UPSTREAM_RPC_URL:-https://api.mainnet-beta.solana.com}
      - PROXY_PORT=8899
      - DEFAULT_BLOCK_THRESHOLD=${DEFAULT_BLOCK_THRESHOLD:-70}
      - RULES_PATH=${RULES_PATH:-/app/rules/presets/default-protection.json}
      - ENABLE_ESCALATIONS=${ENABLE_ESCALATIONS:-false}
      - RUST_LOG=${RUST_LOG:-info,parapet_rpc_proxy=debug}
    volumes:
      - ../../../rpc-proxy/rules:/app/rules:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
