# Minimal cargo-deny configuration for supply chain security
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check for security vulnerabilities
# All ignored advisories are from Solana SDK v2.3.13 dependencies
# that we cannot directly control. Risks are documented and will be
# resolved when Solana updates their dependencies.
ignore = [
    # === TLS/Certificate Validation (rustls-webpki) ===
    # RUSTSEC-2026-0098: Name constraints for URI names were ignored
    # RUSTSEC-2026-0099: Wildcard DNS name constraint validation
    # Source: solana-pubsub-client -> rustls v0.21.12 -> rustls-webpki v0.101.7
    # Risk: Low - requires certificate misissuance after signature verification
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    
    # === Cryptographic Libraries ===
    # RUSTSEC-2022-0093: ed25519-dalek v1.0.1 - Double Public Key Signing Oracle
    # Source: solana-keypair, solana-signature, solana-ed25519-program
    # Risk: Medium - affects signature verification, Solana SDK uses this internally
    # Note: Solana v2.3.13 still uses old ed25519-dalek; track Solana updates
    "RUSTSEC-2022-0093",
    
    # RUSTSEC-2024-0344: curve25519-dalek - Timing variability in scalar operations
    # Source: ed25519-dalek-bip32 v0.2.0 -> curve25519-dalek v3.2.0
    # Risk: Low - timing side-channel requires local access and precise timing
    "RUSTSEC-2024-0344",
    
    # === Unmaintained Crates ===
    # RUSTSEC-2024-0375: atty - unmaintained
    # Source: env_logger (transitive via Solana)
    # Risk: Low - terminal detection utility, no known exploits
    "RUSTSEC-2024-0375",
    
    # RUSTSEC-2024-0388: derivative - unmaintained
    # Source: ark-* crates via Solana's BN254 implementation
    # Risk: Low - macro crate for derives, compile-time only
    "RUSTSEC-2024-0388",
    
    # RUSTSEC-2024-0436: number_prefix - unmaintained
    # Source: indicatif (progress bars)
    # Risk: None - display formatting only
    "RUSTSEC-2024-0436",
    
    # RUSTSEC-2025-0119: paste - unmaintained
    # Source: Various Solana crates
    # Risk: None - macro crate, compile-time only
    "RUSTSEC-2025-0119",
    
    # RUSTSEC-2025-0141: libsecp256k1 - unmaintained
    # Source: ed25519-dalek v1.0.1 -> curve25519-dalek v3.2.0
    # Risk: Low - used for secp256k1 operations, consider alternatives
    "RUSTSEC-2025-0141",
    
    # RUSTSEC-2025-0161: bincode - unmaintained
    # Source: Core Solana serialization dependency
    # Risk: Medium - serialization vulnerabilities possible but Solana SDK widely used
    # Note: Solana team aware and working on alternatives
    "RUSTSEC-2025-0161",
    
    # === Unsound Code ===
    # RUSTSEC-2026-0097: rand - unsound with custom logger using rand::rng()
    # Source: Solana dependencies
    # Risk: Low - only affects custom logger implementations
    "RUSTSEC-2026-0097",
]

[licenses]
# Only allow permissive licenses compatible with MIT
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",                    # Unicode License v3 (ICU, Unicode processing)
    "Unlicense",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "MPL-2.0",                        # Mozilla Public License 2.0 (webpki-roots TLS certificates)
    "CDLA-Permissive-2.0",           # Community Data License Agreement (Mozilla certificate data)
]
confidence-threshold = 0.8

[bans]
# Warn about duplicate dependencies
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
