# cargo-audit configuration for Parapet
# Issues that cannot be fixed due to Solana SDK dependencies

[advisories]
# Ignore vulnerabilities in Solana SDK transitive dependencies
# These will be fixed when Solana updates their dependencies

# ed25519-dalek 1.0.1 - Oracle attack
# Blocked by: Solana SDK 2.3 uses ed25519-dalek 1.0.1
# Resolution: Wait for Solana SDK update to ed25519-dalek >= 2.0
ignore = [
    "RUSTSEC-2022-0093",  # ed25519-dalek oracle attack - Solana SDK dependency
    "RUSTSEC-2024-0344",  # curve25519-dalek timing attack - Solana SDK dependency
    "RUSTSEC-2026-0098",  # rustls-webpki constraints - Can't update due to old rustls version
    "RUSTSEC-2026-0099",  # rustls-webpki wildcards - Can't update due to old rustls version
]

# Ignore unmaintained crate warnings (not vulnerabilities)
# These are warnings, not active exploits
[advisories.unmaintained]
ignore = [
    "RUSTSEC-2024-0375",  # atty - transitiveRUSTSEC-2025-0141",  # bincode - widely used, no replacement yet
    "RUSTSEC-2024-0388",  # derivative - transitive
    "RUSTSEC-2025-0161",  # libsecp256k1 - transitive via Solana
    "RUSTSEC-2025-0119",  # number_prefix - transitive
    "RUSTSEC-2024-0436",  # paste - transitive
    "RUSTSEC-2025-0134",  # rustls-pemfile - transitive
    "RUSTSEC-2021-0145",  # atty unaligned read - transitive
    "RUSTSEC-2026-0097",  # rand unsound - low severity
]
