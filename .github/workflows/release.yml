name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    name: Build Release Binary
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: parapet-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: parapet-macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev build-essential

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build all release binaries
      run: cargo build --workspace --release --verbose

    - name: Strip binary (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: strip target/release/parapet

    - name: Strip binary (macOS)
      if: matrix.os == 'macos-latest'
      run: strip target/release/parapet

    - name: Generate attestation for parapet binary
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: target/release/parapet

    - name: Create tarball
      run: |
        cd target/release
        tar -czf ${{ matrix.artifact-name }}.tar.gz parapet
        sha256sum ${{ matrix.artifact-name }}.tar.gz > ${{ matrix.artifact-name }}.tar.gz.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: |
          target/release/${{ matrix.artifact-name }}.tar.gz
          target/release/${{ matrix.artifact-name }}.tar.gz.sha256

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/parapet-proxy
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./deployments/proxy/docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  release:
    name: Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: ls -R artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          artifacts/parapet-linux-x86_64/parapet-linux-x86_64.tar.gz
          artifacts/parapet-linux-x86_64/parapet-linux-x86_64.tar.gz.sha256
          artifacts/parapet-macos-aarch64/parapet-macos-aarch64.tar.gz
          artifacts/parapet-macos-aarch64/parapet-macos-aarch64.tar.gz.sha256
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Installation
          
          ### Verify Binary Authenticity
          All binaries are signed with GitHub attestations. Verify before use:
          ```bash
          # Download the binary
          tar -xzf parapet-*.tar.gz
          
          # Verify with GitHub CLI
          gh attestation verify parapet --owner securecheckio
          ```
          
          ### Platform-Specific Downloads
          
          - **Linux (x86_64)**: `parapet-linux-x86_64.tar.gz`
          - **macOS (Apple Silicon)**: `parapet-macos-aarch64.tar.gz`
          
          ### Docker (Recommended for servers)
          ```bash
          docker pull ghcr.io/securecheckio/parapet-proxy:${{ github.ref_name }}
          ```
          
          ### SHA256 Checksums
          Verify checksums are provided for each binary tarball.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
