# Minimal cargo-deny configuration for supply chain security
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check for security vulnerabilities
ignore = []

[licenses]
# Only allow permissive licenses compatible with MIT
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unlicense",
    "CC0-1.0",
    "0BSD",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Warn about duplicate dependencies
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
