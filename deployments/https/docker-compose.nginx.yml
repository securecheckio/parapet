version: '3.8'

services:
  # Parapet RPC Proxy
  parapet-rpc-proxy:
    build:
      context: ../..
      dockerfile: deployments/proxy-only/docker/Dockerfile
    container_name: parapet-rpc-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8899:8899"  # Only localhost (nginx proxies)
    environment:
      - UPSTREAM_RPC_URL=${UPSTREAM_RPC_URL:-https://api.mainnet-beta.solana.com}
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
    volumes:
      - ../../rpc-proxy/config.toml:/app/config.toml:ro
      - ../../rpc-proxy/rules:/app/rules:ro
    depends_on:
      - redis
    networks:
      - parapet

  # Parapet API
  parapet-api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: parapet-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"  # Only localhost (nginx proxies)
    environment:
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
    volumes:
      - ../../api/config.toml:/app/config.toml:ro
    depends_on:
      - redis
    networks:
      - parapet

  # Redis
  redis:
    image: redis:7-alpine
    container_name: parapet-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - parapet

  # Nginx (HTTPS Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: parapet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ../../dashboard/dist:/var/www/parapet-dashboard:ro
    networks:
      - parapet
    depends_on:
      - parapet-rpc-proxy
      - parapet-api

  # Certbot (SSL certificate management)
  certbot:
    image: certbot/certbot
    container_name: parapet-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis-data:

networks:
  parapet:
    driver: bridge
