name: Dependency Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 2 AM UTC to catch new CVEs
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Audit Dependencies for CVEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2022-0093 \
            --ignore RUSTSEC-2024-0344 \
            --ignore RUSTSEC-2024-0375 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2025-0161 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2021-0145
        # Keep flags in sync with `audit.toml` at the workspace root (Parapet `Cargo.toml` directory).

      - name: Generate audit report (JSON)
        if: failure()
        run: |
          cargo audit --json \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2022-0093 \
            --ignore RUSTSEC-2024-0344 \
            --ignore RUSTSEC-2024-0375 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2025-0161 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2021-0145 \
            > audit-report.json
      
      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

  cargo-deny:
    name: Check Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      
      - name: Run cargo deny
        run: cargo deny check

  # dependency-review removed - requires GitHub Advanced Security
  # cargo-audit and cargo-deny provide better coverage for Rust projects
  
  sbom:
    name: Generate SBOM (Software Bill of Materials)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-sbom
        run: cargo install cargo-sbom
      
      - name: Generate SBOM (SPDX format)
        run: cargo sbom > parapet-sbom.spdx.json
      
      - name: Generate SBOM (CycloneDX format)
        run: cargo sbom --output-format cyclone_dx_json_1_6 > parapet-sbom.cdx.json
      
      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-path: parapet-sbom.spdx.json
          sbom-path: parapet-sbom.spdx.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            parapet-sbom.spdx.json
            parapet-sbom.cdx.json
          retention-days: 90
