name: Test Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      
      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown
      
      - name: Build WASM mock
        run: cd core/tests/wasm_mock && cargo build --target wasm32-unknown-unknown --release
      
      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Generate HTML coverage report
        run: |
          cargo llvm-cov --workspace --all-features --html
      
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 30
      
      - name: Generate coverage summary
        run: |
          cargo llvm-cov --workspace --all-features --summary-only > coverage-summary.txt
          cat coverage-summary.txt
      
      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 30
      
      - name: Check coverage threshold
        run: |
          # Extract coverage percentage
          COVERAGE=$(cargo llvm-cov --workspace --all-features --summary-only | grep -oP 'TOTAL.*?\K\d+\.\d+(?=%)')
          echo "Coverage: ${COVERAGE}%"
          
          # Set minimum threshold (adjust as needed)
          THRESHOLD=70.0
          
          # Compare coverage to threshold
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi
