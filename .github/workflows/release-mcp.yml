name: Release MCP Server

on:
  push:
    tags:
      - 'mcp-v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: mcp-server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get binary name
        id: binary
        shell: bash
        run: |
          BINARY="parapet-mcp"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY="${BINARY}.exe"
          fi
          echo "name=$BINARY" >> $GITHUB_OUTPUT

      - name: Package
        shell: bash
        run: |
          cd mcp-server/target/${{ matrix.target }}/release
          tar -czf parapet-mcp-${{ matrix.platform }}.tar.gz ${{ steps.binary.outputs.name }}
          sha256sum parapet-mcp-${{ matrix.platform }}.tar.gz > parapet-mcp-${{ matrix.platform }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parapet-mcp-${{ matrix.platform }}
          path: |
            mcp-server/target/${{ matrix.target }}/release/parapet-mcp-${{ matrix.platform }}.tar.gz
            mcp-server/target/${{ matrix.target }}/release/parapet-mcp-${{ matrix.platform }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
