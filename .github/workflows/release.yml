name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    name: Build Release Binary
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: parapet-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: parapet-macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev build-essential

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build all release binaries
      run: cargo build --workspace --release --verbose

    - name: Strip binaries (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        strip target/release/parapet-rpc-proxy
        strip target/release/parapet-api
        strip target/release/parapet-mcp
        strip target/release/wallet-scanner
        strip target/release/program-analyzer
        strip target/release/tx-check
        strip target/release/update-safe-lists
        strip target/release/keygen
        strip target/release/rpc-perf

    - name: Strip binaries (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        strip target/release/parapet-rpc-proxy
        strip target/release/parapet-api
        strip target/release/parapet-mcp
        strip target/release/wallet-scanner
        strip target/release/program-analyzer
        strip target/release/tx-check
        strip target/release/update-safe-lists
        strip target/release/keygen
        strip target/release/rpc-perf

    - name: Generate attestations for all binaries
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: |
          target/release/parapet-rpc-proxy
          target/release/parapet-api
          target/release/parapet-mcp
          target/release/wallet-scanner
          target/release/program-analyzer
          target/release/tx-check
          target/release/update-safe-lists
          target/release/keygen
          target/release/rpc-perf

    - name: Create tarball with all binaries
      run: |
        cd target/release
        tar -czf ${{ matrix.artifact-name }}.tar.gz \
          parapet-rpc-proxy \
          parapet-api \
          parapet-mcp \
          wallet-scanner \
          program-analyzer \
          tx-check \
          update-safe-lists \
          keygen \
          rpc-perf
        sha256sum ${{ matrix.artifact-name }}.tar.gz > ${{ matrix.artifact-name }}.tar.gz.sha256

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: |
          target/release/${{ matrix.artifact-name }}.tar.gz
          target/release/${{ matrix.artifact-name }}.tar.gz.sha256

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/parapet
          ghcr.io/${{ github.repository_owner }}/parapet-rpc-proxy
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
    
    - name: Build and push unified Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  release:
    name: Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: ls -R artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/parapet-linux-x86_64/parapet-linux-x86_64.tar.gz
          artifacts/parapet-linux-x86_64/parapet-linux-x86_64.tar.gz.sha256
          artifacts/parapet-macos-aarch64/parapet-macos-aarch64.tar.gz
          artifacts/parapet-macos-aarch64/parapet-macos-aarch64.tar.gz.sha256
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Installation
          
          ### Included Binaries
          
          This release includes all Parapet components:
          - **parapet-rpc-proxy** - RPC proxy server with security rules
          - **parapet-api** - API server for rule management and escalations
          - **parapet-mcp** - Model Context Protocol server for AI agents
          - **wallet-scanner** - CLI wallet security scanner
          - **program-analyzer** - CLI program analyzer
          - **tx-check** - Transaction security checker
          - **update-safe-lists** - Safe list updater utility
          - **keygen** - Key generation utility
          - **rpc-perf** - Performance testing tool
          
          ### Verify Binary Authenticity
          All binaries are signed with GitHub attestations. Verify before use:
          ```bash
          # Extract all binaries
          tar -xzf parapet-*.tar.gz
          
          # Verify with GitHub CLI
          gh attestation verify parapet-rpc-proxy --owner securecheckio
          ```
          
          ### Platform-Specific Downloads
          
          - **Linux (x86_64)**: `parapet-linux-x86_64.tar.gz`
          - **macOS (Apple Silicon)**: `parapet-macos-aarch64.tar.gz`
          
          ### Docker (Recommended for servers)
          ```bash
          # Pull unified image (contains all binaries)
          docker pull ghcr.io/securecheckio/parapet:${{ github.ref_name }}
          
          # Run specific service
          docker run ghcr.io/securecheckio/parapet:${{ github.ref_name }} parapet-rpc-proxy
          docker run ghcr.io/securecheckio/parapet:${{ github.ref_name }} parapet-api
          docker run ghcr.io/securecheckio/parapet:${{ github.ref_name }} wallet-scanner --help
          ```
          
          ### SHA256 Checksums
          Verify checksums are provided for each binary tarball.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
