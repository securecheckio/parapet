# Minimal cargo-deny configuration for supply chain security
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check for security vulnerabilities
# Ignored vulnerabilities with justification:
ignore = [
    # rustls-webpki vulnerabilities in Solana SDK dependencies
    # - RUSTSEC-2026-0098: Name constraints for URI names were ignored
    # - RUSTSEC-2026-0099: Wildcard name constraint validation issue
    # 
    # Context: These are in solana-pubsub-client v2.3.13 -> rustls v0.21.12 -> rustls-webpki v0.101.7
    # Risk: Low - requires certificate misissuance after signature verification
    # Mitigation: Will be resolved when Solana SDK updates to newer rustls versions
    # Tracking: Monitor Solana SDK releases for rustls/webpki updates
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
]

[licenses]
# Only allow permissive licenses compatible with MIT
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",                    # Unicode License v3 (ICU, Unicode processing)
    "Unlicense",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "MPL-2.0",                        # Mozilla Public License 2.0 (webpki-roots TLS certificates)
    "CDLA-Permissive-2.0",           # Community Data License Agreement (Mozilla certificate data)
]
confidence-threshold = 0.8

[bans]
# Warn about duplicate dependencies
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only allow crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
