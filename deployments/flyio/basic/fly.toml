# Parapet RPC Proxy - Fly.io Configuration
# https://fly.io/docs/reference/configuration/

app = "parapet-rpc-proxy"
primary_region = "iad"  # Change to your preferred region

# Build configuration
[build]
  dockerfile = "Dockerfile"

# Environment variables (non-sensitive)
[env]
  # Upstream Solana RPC - CHANGE THIS to your RPC provider
  UPSTREAM_RPC_URL = "https://api.mainnet-beta.solana.com"
  
  # Proxy configuration
  PROXY_PORT = "8899"
  DEFAULT_BLOCK_THRESHOLD = "70"  # 0-100, lower = stricter
  SOLANA_NETWORK = "mainnet-beta"
  
  # Rules configuration - YOU MUST SET THIS
  # Example: RULES_PATH = "/app/rules/examples/demo-basic-rules.json"
  # Or use RULES_FEED_ENABLED for HTTP rule feeds (see README)
  
  # Rate limiting (conservative defaults)
  RUGCHECK_RATE_LIMIT = "10/60"   # 10 requests per minute (API limit is 15)
  HELIUS_RATE_LIMIT = "20/60"
  JUPITER_RATE_LIMIT = "60/60"
  OTTERSEC_RATE_LIMIT = "30/60"
  
  # Activity feed
  ACTIVITY_FEED_ENABLED = "true"
  ACTIVITY_FEED_MIN_RISK = "30"
  
  # Logging
  RUST_LOG = "info,parapet_rpc_proxy=debug"

# Secrets (set with: fly secrets set KEY=value -a parapet-rpc-proxy)
# All optional:
#   - REDIS_URL (for caching, auto-set by: fly redis connect)
#   - HELIUS_API_KEY
#   - JUPITER_API_KEY
#   - OTTERSEC_API_KEY
#   - RUGCHECK_API_KEY

# HTTP service
[[services]]
  internal_port = 8899
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health check
  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    restart_limit = 3

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

# VM resources
[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Scaling
[scaling]
  min_count = 1
  max_count = 10

# Metrics
[metrics]
  port = 9091
  path = "/metrics"
