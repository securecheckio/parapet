# Parapet Dashboard - Fly.io Configuration (Full Stack)

app = "parapet-dashboard"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.dashboard"

[env]
  API_URL = "https://parapet-api.fly.dev"

[[services]]
  internal_port = 80
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "5s"
    method = "get"
    path = "/"
    protocol = "http"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[scaling]
  min_count = 1
  max_count = 2
