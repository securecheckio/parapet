#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - ufw

write_files:
  - path: /root/docker-compose.yml
    content: |
      version: '3.8'
      
      services:
        rpc-proxy:
          image: ghcr.io/securecheck/rpc-proxy:latest
          restart: always
          environment:
            UPSTREAM_RPC_URL: ${upstream_rpc_url}
            REDIS_URL: redis://:${redis_password}@${redis_host}:6379
            PROXY_PORT: 8899
            RUST_LOG: info
            ENABLE_USAGE_TRACKING: "true"
          ports:
            - "0.0.0.0:8899:8899"
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8899/health"]
            interval: 30s
            timeout: 10s
            retries: 3

runcmd:
  - systemctl enable docker
  - systemctl start docker
  
  # Configure firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow from 10.0.0.0/8 to any port 8899 proto tcp
  - ufw --force enable
  
  # Start RPC proxy
  - cd /root && docker-compose pull && docker-compose up -d

final_message: "RPC proxy droplet ready!"
