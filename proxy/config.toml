# Parapet RPC Proxy - Production Configuration
# Environment variables can override any setting

[server]
port = 8899
bind_address = "0.0.0.0"

[upstream]
# Set via UPSTREAM_RPC_URL environment variable
url = "https://api.mainnet-beta.solana.com"

# Rate limiting
max_concurrent = 10
delay_ms = 100

# Timeouts & Retries (Production Hardening)
timeout_secs = 30
max_retries = 3
retry_base_delay_ms = 100

# Circuit Breaker (Prevents Cascading Failures)
circuit_breaker_threshold = 5
circuit_breaker_timeout_secs = 60

[network]
network = "mainnet-beta"

[security]
default_blocking_threshold = 70
rules_path = "./rules/presets/comprehensive-protection.json"

[auth]
mode = "none"

[usage]
enabled = false
default_requests_per_month = 100000

[redis]
# Uncomment and set via REDIS_URL env var for multi-instance deployments
# url = "redis://localhost:6379"

[wasm]
analyzers_path = "./analyzers"

[escalations]
enabled = false

[rule_feeds]
enabled = false
poll_interval = 3600
default_min_interval = 300
