# Parapet Core API Configuration
# Copy this file to config.toml and customize

[server]
# Server binding configuration
host = "0.0.0.0"
port = 3000

[runtime]
# Tokio worker threads (optional, defaults to one per CPU core)
# worker_threads = 4
# MCP concurrent scan limit (protects against resource exhaustion)
max_concurrent_scans = 10
# MCP scans per hour per API key (used by McpRateLimiter)
scans_per_hour_per_key = 100

[redis]
# Redis URL for dynamic rules, escalations, nonces, and temporary storage
url = "redis://localhost:6379"

[solana]
# Single RPC URL, OR set `rpc_urls = ["https://...","https://..."]` for failover (escalations use parapet-upstream).
rpc_url = "https://api.devnet.solana.com"
# rpc_urls = ["https://api.devnet.solana.com", "https://rpc.ankr.com/solana"]
network = "devnet"

[auth]
# Wallet-based authentication (for rule/escalation management).
# For production, set at least one approver wallet. For local dev only, you may use
# ALLOW_INSECURE_EMPTY_AUTHORIZED_WALLETS=1 with an empty list (see env overrides below).
authorized_wallets = []

# Nonce TTL in seconds (for signature verification)
nonce_ttl_seconds = 60

[mcp]
# API key authentication (for MCP HTTP endpoints)
# SECURITY: Prefer MCP_API_KEYS environment variable in production
api_keys = []

# Environment Variable Overrides:
# - REDIS_URL → overrides [redis].url
# - SOLANA_RPC_URL → overrides [solana] primary URL (single-endpoint list)
# - SOLANA_RPC_URLS → comma-separated list (failover for escalations / sendTransaction)
# - SOLANA_NETWORK → overrides [solana].network
# - AUTHORIZED_WALLETS → overrides [auth].authorized_wallets (comma-separated)
# - MCP_API_KEYS → overrides [mcp].api_keys (comma-separated)
# - ALLOW_INSECURE_EMPTY_AUTHORIZED_WALLETS=1 → allow empty authorized_wallets (development only)
