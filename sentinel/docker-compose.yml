version: '3.8'

services:
  sentinel:
    build: .
    environment:
      # Required: parapet proxy RPC endpoint
      - PARAPET_RPC_URL=${PARAPET_RPC_URL}
      
      # Optional: LLM configuration for fallback navigation
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      
      # Optional: Timeout settings
      - NAVIGATION_TIMEOUT=${NAVIGATION_TIMEOUT:-30000}
      - MAX_STEPS=${MAX_STEPS:-10}
    
    network_mode: bridge
    
    # No volumes mounted - fully isolated
    
    # Example usage:
    # docker-compose run --rm sentinel https://bulktrade.me/coin
