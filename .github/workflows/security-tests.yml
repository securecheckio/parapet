name: Security Tests

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run api escalation auth tests
        run: cargo test -p parapet-api routes::escalations::tests --lib

      - name: Run api websocket auth tests
        run: cargo test -p parapet-api routes::websocket::tests --lib

      - name: Run api auth security tests
        run: cargo test -p parapet-api auth::tests --lib

      - name: Run proxy flowbits integration tests
        run: cargo test -p parapet-proxy --test test_flowbits_integration

      - name: Run proxy upstream resilience tests
        run: cargo test -p parapet-proxy upstream::tests --lib
